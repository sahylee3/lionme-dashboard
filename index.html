<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>라이온미 에스테틱 Dashboard</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a}
.wrap{max-width:1280px;margin:0 auto;padding:28px 24px}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.header h1{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.header h1 span{color:#2563eb}
.header p{font-size:13px;color:#94a3b8;margin-top:4px}
.controls{display:flex;gap:10px;align-items:center}
select{padding:8px 14px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#334155;background:#fff;cursor:pointer;outline:none;font-family:inherit}
.tabs{display:flex;background:#e2e8f0;border-radius:8px;overflow:hidden}
.tabs button{padding:8px 20px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#64748b;transition:all .2s;font-family:inherit}
.tabs button.active{background:#2563eb;color:#fff}
.kpi-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9;flex:1;min-width:180}
.kpi-label{font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.kpi-value{font-size:30px;font-weight:800;color:#0f172a;margin-top:6px;letter-spacing:-0.02em}
.kpi-sub{font-size:12px;color:#94a3b8;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:20px}
.card{background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #f1f5f9}
.card h3{margin:0 0 16px;font-size:15px;font-weight:700;color:#0f172a;letter-spacing:-0.01em}
.card canvas{width:100%!important}
.insight{margin-top:10px;padding:8px 12px;background:#f0f9ff;border-left:3px solid #2563eb;border-radius:0 6px 6px 0;font-size:13px;color:#1e40af;line-height:1.5}
.footer{text-align:center;padding:24px 0 8px;font-size:11px;color:#cbd5e1}
@media(max-width:500px){.grid{grid-template-columns:1fr}.kpi-row{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">

      <div class="tabs"><button class="active" data-tab="A">Part A</button><button data-tab="B">Part B</button></div>
    </div>
  </div>
  <div id="partA"></div>
  <div id="partB" style="display:none"></div>
  <div class="footer">라이온미 에스테틱 · 데이터 기준: 2026.01~03 상담등록 · Built by Claude</div>
</div>

function parseAll(){return C.d.map(r=>({branch:C.bl[r[0]],date:r[1],birth:r[2],job:C.jl[r[3]],channel:C.cl[r[4]],exp:C.el[r[5]],skincare:r[6],concern:r[7],skintype:r[8]}));}
const ALL=parseAll();
let filtered=ALL;
let charts=[];

function splitCount(arr,f,top){
  const m={};arr.forEach(r=>{if(!r[f])return;r[f].split(",").map(s=>s.trim()).filter(Boolean).forEach(k=>{m[k]=(m[k]||0)+1;});});
  let res=Object.entries(m).sort((a,b)=>b[1]-a[1]);if(top)res=res.slice(0,top);return res;
}
function countField(arr,f){
  const m={};arr.forEach(r=>{const v=r[f]||"(미입력)";m[v]=(m[v]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function getAge(b){if(!b)return null;const y=parseInt(b.slice(0,4));if(isNaN(y)||y<1930||y>2015)return null;return 2026-y;}
function ageGroup(b){const a=getAge(b);if(!a)return null;if(a<20)return"10대";if(a<30)return"20대";if(a<40)return"30대";if(a<50)return"40대";if(a<60)return"50대";return"60대+";}

function card(parent,title,h,insightText){
  const d=document.createElement("div");d.className="card";
  d.innerHTML=`<h3>${title}</h3><canvas height="${h||200}"></canvas><div class="insight">💡 <b>So What?</b> ${insightText}</div>`;
  parent.appendChild(d);return d.querySelector("canvas");
}

function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}

function render(){
  destroyCharts();
  const branch=document.getElementById("branchFilter").value;
  filtered=branch==="전체"?ALL:ALL.filter(r=>r.branch===branch);
  renderA();renderB();
}

  const moKeys=Object.keys(mMap).sort();
  const bList=[...new Set(filtered.map(r=>r.branch))].sort();
  cv=card(g,"A-3. 월별 상담등록 추이",180,"월별 추이를 통해 시즌성과 마케팅 캠페인 효과를 확인. 등록 감소 구간에 프로모션 타이밍을 맞출 것.");
  charts.push(new Chart(cv,{type:"line",data:{labels:moKeys,datasets:bList.map(b=>({label:b,data:moKeys.map(m=>(mMap[m]||{})[b]||0),borderColor:BC[b]||"#94a3b8",backgroundColor:BC[b]||"#94a3b8",tension:.3,pointRadius:4,borderWidth:2.5}))},options:{plugins:{legend:{labels:{font:{size:11}}}},scales:{y:{beginAtZero:true,grid:{color:"#f1f5f9"}},x:{grid:{display:false}}}}}));

  // A-4 Channel donut
  const ch=countField(filtered,"channel");
  cv=card(g,"A-4. 방문경로 분포",240,ch[0]?ch[0][0]+"가 "+(ch[0][1]/n*100).toFixed(0)+"%로 압도적. 인스타 단일 채널 의존도가 높아 채널 다변화 전략 필요.":"");
  charts.push(new Chart(cv,{type:"doughnut",data:{labels:ch.map(d=>d[0]),datasets:[{data:ch.map(d=>d[1]),backgroundColor:COLORS.slice(0,ch.length),borderWidth:0}]},options:{cutout:"45%",plugins:{legend:{position:"right",labels:{font:{size:11},boxWidth:12,padding:8}},tooltip:{callbacks:{afterLabel:i=>(i.raw/n*100).toFixed(1)+"%"}}}}}));

  // A-5 Job horizontal
  const jd=countField(filtered,"job");
  cv=card(g,"A-5. 직업 분포",250,"사무직(직장인)이 최다. 점심·퇴근 후 시간대 예약 가용성과 직장인 패키지 구성이 핵심.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:jd.map(d=>d[0]),datasets:[{label:"건수",data:jd.map(d=>d[1]),backgroundColor:"#2563eb",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:"#f1f5f9"}},y:{grid:{display:false},ticks:{font:{size:11}}}}}}));

  // A-6 Concern top10
  const cc=splitCount(filtered,"concern",10);
  cv=card(g,"A-6. 피부고민점 빈도 TOP 10",280,"'"+cc[0][0]+"'이 1위. 모공·속건조·탄력이 3대 고민으로, 시술 패키지 및 홈케어 추천 큐레이션 구성 권장.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:cc.map(d=>d[0]),datasets:[{label:"빈도",data:cc.map(d=>d[1]),backgroundColor:"#10b981",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:"#f1f5f9"}},y:{grid:{display:false},ticks:{font:{size:11}}}}}}));

  // A-7 Skintype
  const st=splitCount(filtered,"skintype");
  cv=card(g,"A-7. 피부타입 분포",220,"건성이 최다이며 색소성·민감성이 뒤를 이음. 민감성 고객 비율이 높아 저자극 라인 강화가 매출 기회.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:st.map(d=>d[0]),datasets:[{label:"건수",data:st.map(d=>d[1]),backgroundColor:"#8b5cf6",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:"#f1f5f9"}},y:{grid:{display:false},ticks:{font:{size:11}}}}}}));

  // A-8 Exp pie
  const ex=countField(filtered,"exp");
  const noExp=filtered.filter(r=>r.exp==="없음"||r.exp==="없음, 기타").length;
  cv=card(g,"A-8. 관리경험 분포",240,(n?(noExp/n*100).toFixed(0):0)+"% 고객이 관리 경험 없음. 초보 고객 온보딩 프로그램 설계가 CX 차별화 포인트.");
  charts.push(new Chart(cv,{type:"doughnut",data:{labels:ex.map(d=>d[0]),datasets:[{data:ex.map(d=>d[1]),backgroundColor:COLORS.slice(0,ex.length),borderWidth:0}]},options:{cutout:"40%",plugins:{legend:{position:"right",labels:{font:{size:10},boxWidth:10,padding:6}}}}}));

  // A-9 Skincare
  const sc=splitCount(filtered,"skincare");
  cv=card(g,"A-9. 스킨케어 사용 제품 빈도",250,"스킨·크림·세럼이 3대 사용 제품. 앰플·팩 사용 비율이 낮아 업셀 포인트로 활용 가능.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:sc.map(d=>d[0]),datasets:[{label:"빈도",data:sc.map(d=>d[1]),backgroundColor:"#f59e0b",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:"#f1f5f9"}},y:{grid:{display:false},ticks:{font:{size:11}}}}}}));
}

function renderB(){
  const el=document.getElementById("partB");el.innerHTML="";
  const g=document.createElement("div");g.className="grid";el.appendChild(g);
  const n=filtered.length;
  const bList=C.bl;

  // B-1 Branch x Channel stacked
  const chKeys=[...new Set(filtered.map(r=>r.channel||"(미입력)"))];
  const b1Map={};filtered.forEach(r=>{const b=r.branch;const ch=r.channel||"(미입력)";if(!b1Map[b])b1Map[b]={};b1Map[b][ch]=(b1Map[b][ch]||0)+1;});
  let cv=card(g,"B-1. 지점별 × 방문경로",220,"모든 지점에서 인스타가 주도적이나, 지인소개·네이버예약 비율은 지점별 편차 존재. 지점 특성에 맞는 채널 믹스 최적화 필요.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:Object.keys(b1Map),datasets:chKeys.map((ch,i)=>({label:ch,data:Object.keys(b1Map).map(b=>(b1Map[b]||{})[ch]||0),backgroundColor:COLORS[i%COLORS.length]}))},options:{plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));

  // B-2 Branch x Concern top5
  const top5c=splitCount(ALL,"concern",5).map(d=>d[0]);
  const b2Map={};filtered.forEach(r=>{if(!r.concern)return;const b=r.branch;if(!b2Map[b])b2Map[b]={};r.concern.split(",").map(s=>s.trim()).forEach(k=>{if(top5c.includes(k))b2Map[b][k]=(b2Map[b][k]||0)+1;});});
  cv=card(g,"B-2. 지점별 × 피부고민 TOP 5",220,"지점별 고민 프로필이 다르면, 지점 특화 시술 메뉴 구성과 상담 스크립트 커스터마이징이 필요.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:Object.keys(b2Map),datasets:top5c.map((k,i)=>({label:k,data:Object.keys(b2Map).map(b=>(b2Map[b]||{})[k]||0),backgroundColor:COLORS[i]}))},options:{plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));

  // B-3 Job x Channel stacked horizontal
  const topJobs=countField(filtered,"job").slice(0,6).map(d=>d[0]);
  const j3Map={};const j3Chs=new Set();
  filtered.forEach(r=>{if(!topJobs.includes(r.job))return;const ch=r.channel||"(미입력)";j3Chs.add(ch);if(!j3Map[r.job])j3Map[r.job]={};j3Map[r.job][ch]=(j3Map[r.job][ch]||0)+1;});
  cv=card(g,"B-3. 직업 × 방문경로",260,"직업 세그먼트별 유효 채널이 다름. 세그먼트별 타깃 광고 전략 설계.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:topJobs,datasets:[...j3Chs].map((ch,i)=>({label:ch,data:topJobs.map(j=>(j3Map[j]||{})[ch]||0),backgroundColor:COLORS[i%COLORS.length]}))},options:{indexAxis:"y",plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{y:{stacked:true,grid:{display:false},ticks:{font:{size:11}}},x:{stacked:true,beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));

  // B-4 Exp x Concern
  const groups={"없음":[],"경험자":[]};
  filtered.forEach(r=>{if(r.exp==="없음"||r.exp==="없음, 기타")groups["없음"].push(r);else if(r.exp&&r.exp!==""&&r.exp!=="(미입력)")groups["경험자"].push(r);});
  cv=card(g,"B-4. 관리경험 × 피부고민 TOP 5",220,"경험 없는 그룹 vs 경험자 그룹의 고민 분포 차이 → 초보 고객용 vs 경험자용 상담 시나리오 분리 설계에 활용.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:top5c,datasets:Object.entries(groups).map(([g,arr],i)=>{const m={};arr.forEach(r=>{if(!r.concern)return;r.concern.split(",").map(s=>s.trim()).forEach(k=>{if(top5c.includes(k))m[k]=(m[k]||0)+1;});});return{label:g,data:top5c.map(k=>m[k]||0),backgroundColor:COLORS[i]};})},options:{plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));

  // B-5 AgeGroup x Concern
  const ageGroups=["10대","20대","30대","40대","50대","60대+"];
  const a5Map={};filtered.forEach(r=>{const ag=ageGroup(r.birth);if(!ag||!r.concern)return;if(!a5Map[ag])a5Map[ag]={};r.concern.split(",").map(s=>s.trim()).forEach(k=>{if(top5c.includes(k))a5Map[ag][k]=(a5Map[ag][k]||0)+1;});});
  const a5Labels=ageGroups.filter(g=>a5Map[g]);
  cv=card(g,"B-5. 연령대별 × 피부고민 TOP 5",240,"20대는 여드름·피지, 40~50대는 주름·탄력 등 연령대별 고민 차이가 뚜렷 → 연령대별 추천 시술 패키지 구성 근거.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:a5Labels,datasets:top5c.map((k,i)=>({label:k,data:a5Labels.map(ag=>(a5Map[ag]||{})[k]||0),backgroundColor:COLORS[i]}))},options:{plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));

  // B-6 AgeGroup x Channel
  const a6Map={};const a6Chs=new Set();
  filtered.forEach(r=>{const ag=ageGroup(r.birth);if(!ag)return;const ch=r.channel||"(미입력)";a6Chs.add(ch);if(!a6Map[ag])a6Map[ag]={};a6Map[ag][ch]=(a6Map[ag][ch]||0)+1;});
  const a6Labels=ageGroups.filter(g=>a6Map[g]);
  cv=card(g,"B-6. 연령대별 × 방문경로",240,"연령대가 높을수록 검색·네이버예약 비중이 올라감. 40대+ 타깃 시 네이버 검색 광고·블로그 SEO 강화가 효과적.");
  charts.push(new Chart(cv,{type:"bar",data:{labels:a6Labels,datasets:[...a6Chs].map((ch,i)=>({label:ch,data:a6Labels.map(ag=>(a6Map[ag]||{})[ch]||0),backgroundColor:COLORS[i%COLORS.length]}))},options:{plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,grid:{color:"#f1f5f9"}}}}}));
}

// Tab switching
document.querySelectorAll(".tabs button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const t=btn.dataset.tab;
    document.getElementById("partA").style.display=t==="A"?"block":"none";
    document.getElementById("partB").style.display=t==="B"?"block":"none";
  });
});

document.getElementById("branchFilter").addEventListener("change",render);

// Chart.js defaults
Chart.defaults.font.family="'Pretendard Variable','Pretendard',sans-serif";
Chart.defaults.animation.duration=400;

render();
</script>
</body>
</html>
